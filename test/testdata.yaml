---

kind: ManagedNamespaceConfiguration
apiVersion: operator.medinvention.io/v1alpha1
metadata:
    name: main-config
spec:
    resources:
        - resource: 
            kind: ClusterRole
            apiVersion: rbac.authorization.k8s.io/v1
            name: mn-node-cluster-role
          content: |
            metadata:
                labels:
                    labels/description: labels-content
            rules:
                - apiGroups: 
                    - ""
                  resources:
                    - "nodes"
                  verbs:
                    - "get"
        - resource: 
            kind: RoleBinding
            apiVersion: rbac.authorization.k8s.io/v1
            name: admin-rolebiding
          content: |
            roleRef:
                kind: ClusterRole
                name: cluster-admin
                apiGroup: rbac.authorization.k8s.io
            subjects:
                - kind: Group
                  name: project-group
        - resource: 
            kind: ConfigMap
            apiVersion: v1
            name: mn-configmap
            namespace: default
          content: |
            metadata:
                annotations:
                    annotations/description: annotation-content
                labels:
                    labels/description: label-content
            data:
                dbname: dbname
                path : "/"
    callbacks:
        - uri: "https://www.google.com"
          method: "GET"
          successcodes: [200, 201]
          headers:
            - name: CUSTOM_HTTP_HEADER
              value: custom-http-header-value
