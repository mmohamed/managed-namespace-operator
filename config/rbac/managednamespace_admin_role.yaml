# This rule is not used by the project managed-namespace itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over operator.medinvention.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: managed-namespace
    app.kubernetes.io/managed-by: kustomize
  name: managednamespace-admin-role
rules:
- apiGroups:
  - operator.medinvention.io
  resources:
  - managednamespaces
  verbs:
  - '*'
- apiGroups:
  - operator.medinvention.io
  resources:
  - managednamespaces/status
  verbs:
  - get
