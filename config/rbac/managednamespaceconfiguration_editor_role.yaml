# This rule is not used by the project managed-namespace itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the operator.medinvention.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: managed-namespace
    app.kubernetes.io/managed-by: kustomize
  name: managednamespaceconfiguration-editor-role
rules:
- apiGroups:
  - operator.medinvention.io
  resources:
  - managednamespaceconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.medinvention.io
  resources:
  - managednamespaceconfigurations/status
  verbs:
  - get
